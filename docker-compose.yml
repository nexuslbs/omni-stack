services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omniagent} -d ${POSTGRES_DB:-omniagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.18.2
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"

  omniagent:
    image: ${OMNIAGENT_IMAGE:-ghcr.io/nexuslbs/omniagent:latest}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://omniagent:***@postgres:5432/omniagent
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      QDRANT_URL: http://qdrant:6333
      HOST: 0.0.0.0
      PORT: 8080
      WORKSPACE_DIR: /opt/workspace
      HINDSIGHT_URL: http://hindsight:8888
      OMNI_DIR: /opt/omni
    volumes:
      - ./:/opt/omni:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /opt/workspace:/opt/workspace:rw
      - /opt/data/credentials:/opt/omni/credentials:ro
    expose:
      - "8080"
    ports:
      - "8080:8080"
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - omniagent_default

  dashboard:
    image: ${DASHBOARD_IMAGE:-ghcr.io/nexuslbs/omni-dashboard:latest}
    ports:
      - "12346:3001"
    environment:
      PORT: "3001"
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: omniagent
      PGHOST: postgres
      OMNI_DIR: /opt/omni
    volumes:
      - /opt/workspace/omni-stack/:/opt/omni/:ro
      - /opt/workspace/omni-stack/user/:/opt/omni/user:rw
      - /opt/workspace/omni-stack/profiles/:/opt/omni/profiles:rw

  # ── Toolbox — always-running utility with backup/cron + dev tools ───
  toolbox:
    image: ${TOOLBOX_IMAGE:-ghcr.io/nexuslbs/omni-stack-toolbox:latest}
    build:
      context: ./toolbox
      dockerfile: Dockerfile
    container_name: omni-toolbox
    restart: unless-stopped
    env_file:
      - .env
      - backup.env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-omniagent}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-omniagent}
    volumes:
      - ./:/opt/omni-stack:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - omni-toolbox-cron:/var/log
    networks:
      - default
      - omniagent_default

  # ── Mattermost ──────────────────────────────────────────────────────
  mattermost-db:
    image: postgres:16.14
    container_name: omm-mm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MM_POSTGRES_USER:-mmuser}
      POSTGRES_PASSWORD: ${MM_POSTGRES_PASSWORD}
      POSTGRES_DB: mattermost
    volumes:
      - omm-mm-db:/var/lib/postgresql/data:rw
    networks:
      - default
      - omniagent_default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mattermost:
    image: mattermost/mattermost-team-edition:10.11.20
    container_name: omm-mattermost
    restart: unless-stopped
    depends_on:
      mattermost-db:
        condition: service_healthy
    expose:
      - "8065"
    ports:
      - "12349:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:***@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://hermes-app-5.nexuslbs.org
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: true
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: true
    volumes:
      - omm-mm-config:/mattermost/config:rw
      - omm-mm-data:/mattermost/data:rw
      - omm-mm-logs:/mattermost/logs:rw
      - omm-mm-plugins:/mattermost/plugins:rw
    networks:
      - default
      - omniagent_default

  # hindsight — persistent memory provider
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:0.7.2
    restart: unless-stopped
    expose:
      - "8888"
      - "9999"
    env_file:
      - .env
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    mem_limit: 2G
    logging:
      driver: journald

volumes:
  postgres_data:
  qdrant_data:
  hindsight-data:
  omm-mm-db:
  omm-mm-config:
  omm-mm-data:
  omm-mm-logs:
  omm-mm-plugins:
  omni-toolbox-cron:

networks:
  omniagent_default:
    external: true
