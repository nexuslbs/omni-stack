name: omni

networks:
  obs-net:
    driver: bridge
    internal: true

services:

  #  Core (always running) 

  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent -d omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: journald

  omniagent:
    image: ${OMNIAGENT_IMAGE:-omniagent-dev:latest}
    build:
      dockerfile: Dockerfile.dev
      context: ${WORKSPACE_DIR:-/opt/workspace}/omniagent
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
        required: false
    environment:
      DATABASE_URL: postgres://omniagent:${POSTGRES_PASSWORD:-}@postgres:5432/omniagent
      OMNI_DIR: ${OMNI_DIR:-/opt/omni}
    volumes:
      - ${WORKSPACE_DIR:-/opt/workspace}/omniagent:/app:rw
      - omniagent-target:/app/target
      - ${WORKSPACE_DIR:-/opt/workspace}/omni-stack:/opt/omni:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ${WORKSPACE_DIR:-/opt/workspace}:/opt/workspace:rw
    expose:
      - "8080"
    ports:
      - "8080:8080"
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: journald

  dashboard:
    image: ${DASHBOARD_IMAGE:-ghcr.io/nexuslbs/omni-dashboard:latest}
    command: ["node", "/opt/repo/server-dist/index.js"]
    ports:
      - "12346:3001"
    environment:
      PORT: "3001"
      OMNI_DIR: ${OMNI_DIR:-/opt/omni}
      EXPLORER_DIR: ${EXPLORER_DIR:-/opt}
    volumes:
      - ${WORKSPACE_DIR:-/opt/workspace}/omni-stack/:/opt/omni/:rw
      - ${WORKSPACE_DIR:-/opt/workspace}/omni-stack/user/:/opt/omni/user:rw
      - ${WORKSPACE_DIR:-/opt/workspace}/omni-stack/profiles/:/opt/omni/profiles:rw
      - ${WORKSPACE_DIR:-/opt/workspace}/omni-dashboard:/opt/repo:rw
      - /opt/data:/opt/data:ro
      - /opt/hermes:/opt/hermes:ro
      - /opt/hermes-repo:/opt/hermes-repo:ro
      - ${WORKSPACE_DIR:-/opt/workspace}:/opt/workspace:ro
    logging:
      driver: journald

  toolbox:
    image: ${TOOLBOX_IMAGE:-ghcr.io/nexuslbs/omni-stack-toolbox:latest}
    build:
      context: ./services/toolbox
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: omniagent
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: omniagent
      OMNI_DIR: /opt/omni-stack
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_PATH: ${S3_PATH:-omni}
      CRON_BACKUP: ${BACKUP_CRON_SCHEDULE}
      CRON_CHECKPOINT: ${CHECKOUT_CRON_SCHEDULE}
    volumes:
      - ./:/opt/omni-stack:rw
      - /opt:/opt/:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - omni-toolbox-cron:/var/log
    logging:
      driver: journald

  #  Observability: Cloudflare Tunnel 
  cloudflared:
    profiles: ["tunnel", "all"]
    container_name: omni-cloudflared
    build:
      context: services/cloudflared
      dockerfile: Dockerfile
      args:
        CLOUDFLARED_IMAGE: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.7.1}
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    mem_limit: 200M
    logging:
      driver: journald

  #  Mattermost (profile: mattermost) 
  mattermost-db:
    image: ${MATTERMOST_DB_IMAGE:-postgres:16.14}
    profiles: ["mattermost", "all"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: mmuser
      POSTGRES_PASSWORD: ${MM_POSTGRES_PASSWORD}
      POSTGRES_DB: mattermost
    volumes:
      - mm-db:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: journald

  mattermost:
    image: ${MATTERMOST_IMAGE:-mattermost/mattermost-team-edition:10.11.20}
    profiles: ["mattermost", "all"]
    restart: unless-stopped
    command: ["mattermost", "server"]
    depends_on:
      mattermost-db:
        condition: service_healthy
    expose:
      - "8065"
    ports:
      - "12349:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:${MM_POSTGRES_PASSWORD}@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: ${MM_SITEURL:-}
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: true
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: true
    volumes:
      - mm-config:/mattermost/config:rw
      - mm-data:/mattermost/data:rw
      - mm-logs:/mattermost/logs:rw
      - mm-plugins:/mattermost/plugins:rw
    logging:
      driver: journald

  #  Memory: Hindsight (profile: memory) 
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:v1.18.2}
    profiles: ["memory", "all"]
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"
    logging:
      driver: journald

  hindsight:
    image: ${HINDSIGHT_IMAGE:-ghcr.io/vectorize-io/hindsight:0.7.2}
    profiles: ["memory", "all"]
    restart: unless-stopped
    expose:
      - "8888"
      - "9999"
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    mem_limit: 2G
    logging:
      driver: journald

  #  Observability: Metrics: cAdvisor → Prometheus 
  cadvisor:
    profiles: ["cadvisor", "all"]
    image: ${CADVISOR_IMAGE:-ghcr.io/google/cadvisor:v0.57.0}
    container_name: omni-cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - "--docker_only"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    mem_limit: 200M
    logging:
      driver: journald

  prometheus:
    profiles: ["monitor", "cadvisor", "all"]
    build:
      context: services/prometheus
      dockerfile: Dockerfile
      args:
        PROMETHEUS_IMAGE: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.5.5}
    container_name: omni-prometheus
    restart: unless-stopped
    user: root
    entrypoint:
      - '/bin/prometheus'
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - omni-prometheus-vol:/prometheus:rw
    mem_limit: 500M
    logging:
      driver: journald

  #  Observability: Log Pipeline: Vector → Loki 
  vector:
    profiles: ["logs", "all"]
    container_name: omni-vector
    build:
      context: services/vector
      dockerfile: Dockerfile
      args:
        VECTOR_IMAGE: ${VECTOR_IMAGE:-timberio/vector:0.55.0-debian}
    restart: unless-stopped
    volumes:
      - /var/log/journal:/var/log/journal:ro
      - /run/systemd/journal:/run/systemd/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - omni-vector-vol:/var/lib/vector:rw
    user: "0"
    networks:
      - obs-net
    depends_on:
      - loki
    mem_limit: 500M
    logging:
      driver: journald

  loki:
    profiles: ["logs", "all"]
    container_name: omni-loki
    build:
      context: services/loki
      dockerfile: Dockerfile
      args:
        LOKI_IMAGE: ${LOKI_IMAGE:-grafana/loki:3.7.2}
    restart: unless-stopped
    volumes:
      - omni-loki-vol:/loki:rw
    networks:
      - obs-net
    command: -config.file=/etc/loki/loki-config.yaml
    user: root
    mem_limit: 500M
    logging:
      driver: journald

  #  Observability: Dashboards 
  grafana:
    profiles: ["logs", "monitor", "cadvisor", "all"]
    container_name: omni-grafana
    build:
      context: services/grafana
      dockerfile: Dockerfile
      args:
        GRAFANA_IMAGE: ${GRAFANA_IMAGE:-grafana/grafana:13.0.1}
    restart: unless-stopped
    user: root
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - omni-grafana-vol:/var/lib/grafana:rw
    networks:
      - default
      - obs-net
    depends_on:
      loki:
        condition: service_started
        required: false
    mem_limit: 500M
    logging:
      driver: journald

  #  Noop Provider (profile: noop) 
  noop-provider:
    profiles: ["noop", "all"]
    build:
      context: services/noop
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9090"
    logging:
      driver: journald


volumes:
  postgres_data:
  qdrant_data:
  hindsight-data:
  omniagent-target:
  mm-db:
  mm-config:
  mm-data:
  mm-logs:
  mm-plugins:
  omni-toolbox-cron:
  omni-loki-vol:
  omni-grafana-vol:
  omni-prometheus-vol:
  omni-vector-vol:
