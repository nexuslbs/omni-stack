services:
  mattermost-db:
    image: postgres:16.14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MM_POSTGRES_USER:-mmuser}
      POSTGRES_PASSWORD: ${MM_POSTGRES_PASSWORD}
      POSTGRES_DB: mattermost
    volumes:
      - omm-mm-db:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mmuser -d mattermost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mattermost:
    image: mattermost/mattermost-team-edition:10.11.20
    restart: unless-stopped
    depends_on:
      mattermost-db:
        condition: service_healthy
    expose:
      - "8065"
    ports:
      - "12340:8065"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mmuser:***@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://hermes-app-5.nexuslbs.org
      MM_SERVICESETTINGS_ENABLEBOTACCOUNTCREATION: true
      MM_SERVICESETTINGS_ENABLEUSERACCESSTOKENS: true
    volumes:
      - omm-mm-config:/mattermost/config:rw
      - omm-mm-data:/mattermost/data:rw
      - omm-mm-logs:/mattermost/logs:rw
      - omm-mm-plugins:/mattermost/plugins:rw

volumes:
  omm-mm-db:
  omm-mm-config:
  omm-mm-data:
  omm-mm-logs:
  omm-mm-plugins:
