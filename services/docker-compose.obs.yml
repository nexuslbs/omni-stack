# Observability stack for OmniAgent — log aggregation, metrics, dashboards, tunnel
# Usage: docker compose -f docker-compose.yml -f services/docker-compose.obs.yml up -d
# (run from omni-stack root so networks resolve)

name: omni

networks:
  default:
    external: true
    name: omni_default
  obs-net:
    driver: bridge
    internal: true

volumes:
  omni-loki-vol:
  omni-grafana-vol:
  omni-prometheus-vol:
  omni-vector-vol:

services:
  # ── Log Pipeline: Vector → Loki ───────────────────────────────────────
  vector:
    profiles: ["obs"]
    container_name: omni-vector
    build:
      context: services/vector
      dockerfile: Dockerfile
      args:
        VECTOR_IMAGE: timberio/vector:0.55.0-debian
    restart: unless-stopped
    volumes:
      - /var/log/journal:/var/log/journal:ro
      - /run/systemd/journal:/run/systemd/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - omni-vector-vol:/var/lib/vector:rw
    user: "0"
    networks:
      - obs-net
    depends_on:
      - loki
    mem_limit: 500M
    logging:
      driver: journald

  loki:
    profiles: ["obs"]
    container_name: omni-loki
    build:
      context: services/loki
      dockerfile: Dockerfile
      args:
        LOKI_IMAGE: grafana/loki:3.7.2
    restart: unless-stopped
    volumes:
      - omni-loki-vol:/loki:rw
    networks:
      - obs-net
    command: -config.file=/etc/loki/loki-config.yaml
    user: root
    mem_limit: 500M
    logging:
      driver: journald

  # ── Metrics Pipeline: cAdvisor → Prometheus ───────────────────────────
  cadvisor:
    profiles: ["obs"]
    image: ghcr.io/google/cadvisor:v0.57.0
    container_name: omni-cadvisor
    restart: unless-stopped
    privileged: true
    command:
      - "--docker_only"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - default
    mem_limit: 200M
    logging:
      driver: journald

  prometheus:
    profiles: ["obs"]
    build:
      context: services/prometheus
      dockerfile: Dockerfile
    container_name: omni-prometheus
    restart: unless-stopped
    user: root
    entrypoint:
      - '/bin/prometheus'
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - omni-prometheus-vol:/prometheus:rw
    networks:
      - default
    mem_limit: 500M
    logging:
      driver: journald

  # ── Dashboards ─────────────────────────────────────────────────────────
  grafana:
    profiles: ["obs"]
    container_name: omni-grafana
    build:
      context: services/grafana
      dockerfile: Dockerfile
      args:
        GRAFANA_IMAGE: grafana/grafana:13.0.1
    restart: unless-stopped
    user: root
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - omni-grafana-vol:/var/lib/grafana:rw
    networks:
      - default
      - obs-net
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - loki
    mem_limit: 500M
    logging:
      driver: journald

  # ── Cloudflare Tunnel ──────────────────────────────────────────────────
  cloudflared:
    profiles: ["obs"]
    container_name: omni-cloudflared
    build:
      context: services/cloudflared
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - default
    mem_limit: 200M
    logging:
      driver: journald
