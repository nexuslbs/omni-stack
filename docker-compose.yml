services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-omniagent}
      POSTGRES_USER: ${POSTGRES_USER:-omniagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omniagent} -d ${POSTGRES_DB:-omniagent}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.18.2
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"

  omniagent:
    image: ${OMNIAGENT_IMAGE:-ghcr.io/nexuslbs/omniagent:latest}
    build:
      context: /opt/workspace/omniagent
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://omniagent:${POSTGRES_PASSWORD}@postgres:5432/omniagent
      QDRANT_URL: http://qdrant:6333
      HOST: 0.0.0.0
      PORT: 8080
      WORKSPACE_DIR: /opt/workspace
      HINDSIGHT_URL: http://hindsight:8888
      SQLX_OFFLINE: "false"
    volumes:
      - ./:/opt/data:rw
      - /opt/workspace/omniagent:/app:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /opt/workspace:/opt/workspace:rw
      - /opt/data/credentials:/opt/data/credentials:ro
    expose:
      - "8080"
    ports:
      - "8080:8080"
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - omniagent_default

  dashboard:
    image: node:22-alpine
    working_dir: /app
    command: ["node", "/app/server/index.js"]
    ports:
      - "12346:3001"
    environment:
      PORT: "3001"
      PGPASSWORD: ${PGPASSWORD}
      PGUSER: ${POSTGRES_USER:-omniagent}
      PGHOST: postgres
    volumes:
      - /opt/workspace/omni-stack/:/opt/data/:ro
      - /opt/workspace/omni-stack/user/:/opt/data/user:rw
      - /opt/workspace/omni-stack/profiles/:/opt/data/profiles:rw
      - /opt/workspace/omni-dashboard/repo/dist:/app/dist:ro
      - /opt/workspace/omni-dashboard/repo/server-dist:/app/server:ro
      - /opt/workspace/omni-dashboard/repo/node_modules:/app/node_modules:ro

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    env_file:
      - backup.env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-omniagent}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${POSTGRES_DB:-omniagent}
    volumes:
      - ./:/opt/data:rw

  # ── Toolbox (on-demand utility container) ────────────────────────────
  toolbox:
    image: python:3-alpine
    profiles:
      - manual
    container_name: omni-toolbox
    entrypoint: ["sh", "-c", "apk add --no-cache curl; exec tail -f /dev/null"]
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/opt/omni-stack:rw
    networks:
      - default
      - omniagent_default

  # hindsight — persistent memory provider
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:0.7.2
    restart: unless-stopped
    expose:
      - "8888"
      - "9999"
    env_file:
      - .env
    volumes:
      - hindsight-data:/home/hindsight/.pg0
    mem_limit: 2G
    logging:
      driver: journald

volumes:
  postgres_data:
  qdrant_data:
  hindsight-data:

networks:
  omniagent_default:
    external: true
