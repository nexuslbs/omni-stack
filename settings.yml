# Settings for OmniAgent
# Values support $env:VAR and $secret:NAME refs.

general:
  condense_keep_turns: 4
  delete_after_days: 30
  llm_provider: opencode-go
  max_inline_file_kb: 100
  max_pool_connections: 5
  max_tokens: 4096
  max_unfinished_subtask_retries: 3
  old_message_char_budget: 100000
  soul_max_chars: 1000
  state_block_update_interval: 5
  temperature: 0.7
  thread_summary_tokens: 2048
  tokenizer_encoding: gpt-4
  watchdog_default: ''

execution:
  max_iterations_no_plan: 30
  max_iterations_plan: 120
  tool_long_timeout_secs: 300
  tool_short_timeout_secs: 5

prompt:
  prompt_char_budget_hard: 500000
  prompt_char_budget_soft: 350000
  prompt_compact_messages_tool: prompt_compact-messages
  prompt_generate_tool: prompt_generate
  prompt_log_level: first
  prompt_token_budget_hard: 350000
  prompt_token_budget_soft: 200000
  prompt_token_safety_factor: 15.0

memory:
  memory_max_chars: 5000
  messages_vectorization_api_key: ''
  messages_vectorization_api_model: ''
  messages_vectorization_api_url: ''
  messages_vectorization_interval: 3600
  messages_vectorization_method: local
  messages_vectorization_protocol: openai
  vectorize_messages: false
  vectorize_wiki: false
  wiki_vectorization_api_key: ''
  wiki_vectorization_api_model: ''
  wiki_vectorization_api_url: ''
  wiki_vectorization_interval: 3600
  wiki_vectorization_method: local
  wiki_vectorization_protocol: openai
