name: Publish images

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'

jobs:
  publish-omniagent:
    name: Publish omniagent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent
          token: ${{ secrets.GH_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omniagent
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-omni-dashboard:
    name: Publish omni-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard
          token: ${{ secrets.GH_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-dashboard
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-omni-stack-toolbox:
    name: Publish omni-stack-toolbox
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack
          token: ${{ secrets.GH_PAT }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-stack-toolbox
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./toolbox
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
