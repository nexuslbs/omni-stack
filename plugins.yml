platforms:
  mattermost:
    enabled: true
    source: bundled
    config:
      access_token: $env:MATTERMOST_ACCESS_TOKEN
      max_download_bytes: 500
tools:
  actions:
    enabled: false
    source: bundled
    config: {}
  cron:
    enabled: true
    source: built-in
    config: {}
  fetch:
    enabled: true
    source: bundled
    config: {}
  filesystem:
    enabled: true
    source: bundled
    config: {}
  git:
    enabled: true
    source: bundled
    config: {}
  hindsight:
    enabled: true
    source: built-in
    config: {}
  kanban:
    enabled: true
    source: built-in
    config: {}
  memory:
    enabled: true
    source: built-in
    config: {}
  metrics:
    enabled: true
    source: built-in
    config: {}
  plugin-manager:
    enabled: true
    source: built-in
    config: {}
  query:
    enabled: true
    source: built-in
    config: {}
  search:
    enabled: true
    source: built-in
    config: {}
  skills:
    enabled: true
    source: bundled
    config: {}
  subtasks:
    enabled: true
    source: built-in
    config: {}
  test-rust-tool:
    enabled: false
    source: remote
    config: {}
providers:
  anthropic:
    enabled: false
    source: bundled
    config:
      api_key: $env:ANTHROPIC_API_KEY
      default_model: claude-sonnet-4
  deepseek:
    enabled: true
    source: bundled
    config:
      api_key: $env:DEEPSEEK_API_KEY
      default_model: deepseek-v4-flash
  openai:
    enabled: false
    source: bundled
    config:
      api_key: $env:OPENAI_API_KEY
      default_model: gpt-4o
  opencode-go:
    enabled: true
    source: bundled
    config:
      api_key: $env:OPENCODE_GO_API_KEY
      default_model: deepseek-v4-flash
  test-rust-tool:
    enabled: false
    source: remote
    config: {}
