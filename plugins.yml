platforms:
  mattermost:
    enabled: true
    source: bundled
    config:
      server_url: "$env:MATTERMOST_SERVER_URL"
      access_token: "$env:MATTERMOST_ACCESS_TOKEN"
      connection_mode: websocket
      polling_interval: 15
      setup_team: "$env:MM_TEAM"
      setup_channel: "$env:MM_CHANNEL"
      bot_user: "$env:MM_BOT_USERNAME"
      bot_password: "$env:MM_BOT_PASSWORD"
      admin_user: "$env:MM_USERNAME"
      admin_password: "$env:MM_USER_PASSWORD"
      test_user: "$env:MM_TEST_USERNAME"
      test_password: "$env:MM_TEST_PASSWORD"
      max_download_bytes: 500
  telegram:
    enabled: false
    source: bundled
    config:
      bot_token: ""
tools:
  actions:
    enabled: true
    source: bundled
    config: {}
  cron:
    enabled: true
    source: built-in
    config: {}
  docker:
    enabled: true
    source: bundled
    config: {}
  fetch:
    enabled: true
    source: bundled
    config: {}
  filesystem:
    enabled: true
    source: bundled
    config: {}
  git:
    enabled: false
    source: bundled
    config: {}
  hindsight:
    enabled: true
    source: built-in
    config: {}
  kanban:
    enabled: false
    source: built-in
    config: {}
  memory:
    enabled: false
    source: built-in
    config: {}
  metrics:
    enabled: true
    source: built-in
    config: {}
  plugin-manager:
    enabled: false
    source: built-in
    config: {}
  query:
    enabled: true
    source: built-in
    config: {}
  search:
    enabled: true
    source: built-in
    config: {}
  skills:
    enabled: false
    source: bundled
    config: {}
  subtasks:
    enabled: true
    source: built-in
    config: {}
providers:
  anthropic:
    enabled: false
    source: bundled
    config:
      api_key: "$env:ANTHROPIC_API_KEY"
      default_model: claude-sonnet-4
  deepseek:
    enabled: true
    source: bundled
    config:
      api_key: "$env:DEEPSEEK_API_KEY"
      default_model: deepseek-v4-flash
  noop:
    enabled: true
    source: bundled
    config: {}
  noop-full:
    enabled: true
    source: bundled
    config: {}
  openai:
    enabled: false
    source: bundled
    config:
      api_key: "$env:OPENAI_API_KEY"
      default_model: gpt-4o
  opencode-go:
    enabled: true
    source: bundled
    config:
      api_key: "$env:OPENCODE_GO_API_KEY"
      default_model: deepseek-v4-flash
