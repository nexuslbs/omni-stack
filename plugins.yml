platforms:
  mattermost:
    enabled: true
    source: bundled
    config:
      access_token: $env:MATTERMOST_ACCESS_TOKEN
      server_url: http://mattermost:8065
  telegram:
    enabled: false
    source: bundled
    config:
      bot_token: ''
tools:
  fetch:
    enabled: true
    source: bundled
    config: {}
  filesystem:
    enabled: true
    source: bundled
    config: {}
  git:
    enabled: true
    source: bundled
    config: {}
  hindsight:
    enabled: true
    source: built-in
    config: {}
  kanban:
    enabled: false
    source: built-in
    config: {}
  memory:
    enabled: true
    source: built-in
    config: {}
  metrics:
    enabled: true
    source: built-in
    config: {}
  plugin-manager:
    enabled: false
    source: built-in
    config: {}
  prompt:
    enabled: true
    source: built-in
    config: {}
  query:
    enabled: true
    source: built-in
    config: {}
  search:
    enabled: true
    source: built-in
    config: {}
  skills:
    enabled: false
    source: bundled
    config: {}
  subtasks:
    enabled: true
    source: built-in
    config: {}
providers:
  deepseek:
    enabled: true
    source: bundled
    config:
      api_key: $secret:DEEPSEEK_API_KEY
      default_model: deepseek-v4-flash
  noop:
    enabled: true
    source: bundled
    config: {}
  noop-full:
    enabled: true
    source: bundled
    config: {}
  openai:
    enabled: false
    source: bundled
    config: {}
  opencode-go:
    enabled: true
    source: bundled
    config: {}
