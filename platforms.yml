platforms:
  mattermost:
    enabled: true
    config:
      server_url: $env:MATTERMOST_SERVER_URL
      access_token: $env:MATTERMOST_ACCESS_TOKEN
      connection_mode: websocket
      polling_interval: 15
      setup_team: $env:MM_TEAM
      setup_channel: $env:MM_CHANNEL
      bot_user: $env:MM_BOT_USERNAME
      admin_user: $env:MM_USERNAME
      admin_password: $env:MM_USER_PASSWORD
      test_user: $env:MM_TEST_USERNAME
      test_password: $env:MM_TEST_PASSWORD
  telegram:
    enabled: false
    config:
      bot_token: ''
  test-python:
    enabled: false
    config: {}
  test-rust:
    enabled: false
    config: {}
tools: null
providers: null
