name: Publish images

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'

jobs:
  build-omniagent:
    name: Build omniagent
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omniagent
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omniagent

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omniagent
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omniagent.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omniagent-image
          path: /tmp/omniagent.tar.gz
          retention-days: 1

  build-omni-dashboard:
    name: Build omni-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omni-dashboard
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-dashboard

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-dashboard
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omni-dashboard.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-dashboard-image
          path: /tmp/omni-dashboard.tar.gz
          retention-days: 1

  build-omni-stack-toolbox:
    name: Build omni-stack-toolbox
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}

    steps:
      - name: Checkout omni-stack
        uses: actions/checkout@v4
        with:
          repository: nexuslbs/omni-stack

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nexuslbs/omni-stack-toolbox
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/stable' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./toolbox
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image
        run: docker save $(echo "${{ steps.meta.outputs.tags }}" | tr '\n' ' ') | gzip > /tmp/omni-stack-toolbox.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-stack-toolbox-image
          path: /tmp/omni-stack-toolbox.tar.gz
          retention-days: 1

  publish:
    name: Publish all images
    runs-on: ubuntu-latest
    needs: [build-omniagent, build-omni-dashboard, build-omni-stack-toolbox]
    if: success()
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download omniagent image
        uses: actions/download-artifact@v4
        with:
          name: omniagent-image
          path: omniagent-image

      - name: Download omni-dashboard image
        uses: actions/download-artifact@v4
        with:
          name: omni-dashboard-image
          path: omni-dashboard-image

      - name: Download omni-stack-toolbox image
        uses: actions/download-artifact@v4
        with:
          name: omni-stack-toolbox-image
          path: omni-stack-toolbox-image

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load and push omniagent
        run: |
          gunzip -c omniagent-image/omniagent.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omniagent'); do
            docker push "$tag"
          done

      - name: Load and push omni-dashboard
        run: |
          gunzip -c omni-dashboard-image/omni-dashboard.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omni-dashboard'); do
            docker push "$tag"
          done

      - name: Load and push omni-stack-toolbox
        run: |
          gunzip -c omni-stack-toolbox-image/omni-stack-toolbox.tar.gz | docker load
          for tag in $(docker images --format '{{.Repository}}:{{.Tag}}' | grep 'ghcr.io/nexuslbs/omni-stack-toolbox'); do
            docker push "$tag"
          done
