# Dev overlay — adds cargo build capabilities to the omniagent container
# and binds source mounts for the dashboard.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
services:
  omniagent:
    build:
      context: /opt/workspace/omniagent
      dockerfile: Dockerfile.dev
    image: omniagent-dev:latest
    environment:
      CARGO_TARGET_DIR: /target
      # Only what cargo needs at compile time (sql_forge! verification)
      DATABASE_URL: postgres://omniagent:${POSTGRES_PASSWORD}@postgres:5432/omniagent
    volumes:
      - /opt/workspace/omniagent:/app:rw
      - cargo-registry:/usr/local/cargo/registry
      - cargo-target:/target

  dashboard:
    build:
      context: /opt/workspace/omni-dashboard/repo
      dockerfile: Dockerfile
    volumes:
      - /opt/workspace/omni-dashboard/repo/dist:/app/dist:ro
      - /opt/workspace/omni-dashboard/repo/server-dist:/app/server:ro
      - /opt/workspace/omni-dashboard/repo/node_modules:/app/node_modules:ro

networks:
  default:
    driver: bridge

volumes:
  cargo-registry:
  cargo-target:
